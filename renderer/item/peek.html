<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://web.poecdn.com data:; style-src 'unsafe-inline'">
<style>
  /* Refined Ember peek card. This window's CSP allows inline styles; colours are
     hardcoded here (it's a separate document from the main window's tokens). */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* overflow:hidden kills the scrollbar that briefly flashes while the card is
     momentarily taller than the window, before main.js resizes it to fit. The
     window is click-through (setIgnoreMouseEvents) so that scrollbar was never
     usable anyway - hiding it loses nothing and stops the render flicker. */
  html, body { background: transparent; overflow: hidden; }
  #card {
    /* peek-client.js overrides background with rgba(16,15,13, alpha) to match the
       overlay's transparency setting; the header band + sections layer on top */
    background: rgba(28, 25, 22, 0.97);
    border: 1px solid rgba(232, 210, 180, 0.14);
    border-radius: 10px;
    box-shadow: 0 12px 34px rgba(0, 0, 0, 0.6);
    color: #c9c1b0;
    font: 12.5px/1.5 "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }
  /* raised header band */
  .pk-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #221e18; border-bottom: 1px solid rgba(232,210,180,.12); }
  .pk-icon { width: 40px; height: 40px; object-fit: contain; filter: drop-shadow(0 1px 4px rgba(0,0,0,.5)); }
  .pk-icon-wrap { position: relative; width: 40px; height: 40px; flex: 0 0 40px; }
  .ic-pips { position: absolute; left: 1px; bottom: 1px; display: flex; gap: 2px; }
  .ic-pip { width: 6px; height: 6px; border-radius: 50%; background: #16130f; border: 1px solid rgba(232,210,180,.55); box-shadow: 0 0 3px rgba(0,0,0,.8); }
  .pk-name { color: #ece4d4; font-weight: 700; font-size: 14px; }
  .pk-base { color: #8d8574; font-size: 11.5px; }
  .pk-price { margin-left: auto; text-align: right; color: #f0d9a8; font-weight: 700; font-size: 16px; white-space: nowrap; }
  .pk-price .cur { color: #b89968; font-size: 11px; font-weight: 500; }
  .pk-age { color: #6b6355; font-size: 10px; font-weight: 400; }

  /* flags = quiet text badges, no borders */
  .pk-flags { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 12px 2px; }
  .pk-head .pk-flags { padding: 3px 0 0; gap: 7px; } /* status tags ride the header block */
  .pk-flag { font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #c07a6a; }
  .pk-flag-corrupted { color: #e0554a; }
  .pk-flag-desecrated { color: #8fd44f; }
  .pk-flag-mirrored { color: #8db4d0; }
  .pk-flag-sanctified { color: #e0c060; }
  .pk-flag-unrevealed { color: #a77fdf; }

  .pk-stats { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 8px 12px; }
  .pk-stat { color: #8d8574; font-size: 12px; }
  .pk-stat b { color: #f0d9a8; font-size: 14px; font-weight: 700; }

  /* section micro-label (VS YOUR ITEM / RUNES & IMPLICITS / EXPLICITS ...) */
  .pk-seclab { font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b6355; padding: 8px 12px 3px; border-top: 1px solid rgba(232,210,180,.06); }
  .pk-seclab .pk-key { text-transform: none; letter-spacing: 0; color: #5c564a; font-size: 9px; }

  /* VS YOUR ITEM: label | value | fixed 40px delta */
  .pk-compare { padding: 2px 12px 6px; display: flex; flex-direction: column; gap: 3px; }
  .pk-cmp { display: grid; grid-template-columns: 1fr auto 40px; align-items: baseline; gap: 8px; font-size: 12px; color: #8d8574; }
  .pk-cmp b { color: #f0d9a8; font-size: 13px; font-weight: 700; }
  .pk-cmp .pk-delta { text-align: right; }

  /* mod lines: text (flex) | fixed 40px delta column */
  .pk-mods { padding: 2px 12px 6px; display: flex; flex-direction: column; gap: 1px; }
  .pk-mod { display: flex; align-items: baseline; gap: 6px; color: #8a8372; font-size: 12px; line-height: 1.45; }
  .pk-mtext { flex: 1; min-width: 0; }
  .pk-mod.match, .pk-mod.match .pk-mtext { color: #e4ddca; }
  .pk-mod .num { color: #f0d9a8; }
  .pk-delta { width: 40px; flex-shrink: 0; text-align: right; font-size: 11px; font-weight: 700; }
  .pk-delta.up { color: #7ec46a; }
  .pk-delta.down { color: #e08a7a; }
  .pk-tag { font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.85; margin-left: 5px; }
  .pk-tag-des, .pk-tag-desecrated { color: #8fd44f; }
  .pk-tag-fractured { color: #c8a05a; }
  .pk-tag-crafted { color: #93c5e8; }

  /* runes/implicits read game-green; implicits lean blue when matched */
  .pk-sec-rune .pk-mod, .pk-sec-rune .pk-mod .num, .pk-sec-added-rune .pk-mod, .pk-sec-enchant .pk-mod { color: #77a58a; }
  .pk-sec-rune .pk-mod.match { color: #9fc4ae; }
  .pk-sec-implicit .pk-mod, .pk-sec-implicit .pk-mod .num { color: #7f9fb8; }
  .pk-sec-implicit .pk-mod.match { color: #b9cede; }

  /* crafted blue / fractured tan */
  .pk-mod.crafted { color: #93c5e8; }
  .pk-mod.crafted.match { color: #bfe0f5; }
  .pk-mod.fractured { color: #c8a05a; }
  .pk-mod.fractured.match { color: #e0c48a; }
  /* DESECRATED - green-tint bg + inset bar + tag (replaces the old solid fill + glow) */
  .pk-mod.des { background: rgba(154, 222, 74, 0.09); box-shadow: inset 2px 0 0 #8fd44f; color: #cfe6a8; border-radius: 2px; padding: 1px 6px; margin: 1px -6px; }
  .pk-mod.des.match { color: #e2f2c2; }

  .pk-miss { color: #c8705a; font-size: 11.5px; margin: 4px 12px 8px; }
</style>
</head>
<body>
  <div id="card"></div>
  <script src="peek-client.js"></script>
</body>
</html>
